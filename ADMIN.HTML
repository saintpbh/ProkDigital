<style>
    .admin-body {
        background: #2c3e50;
        color: white;
        padding: 20px;
    }

    .status-bar {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }

    .stat-card {
        background: #34495e;
        padding: 20px;
        border-radius: 8px;
        flex: 1;
    }

    .admin-table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        color: #333;
        border-radius: 8px;
        overflow: hidden;
    }

    .admin-table th {
        background: #ecf0f1;
        padding: 15px;
        text-align: left;
    }

    .admin-table td {
        padding: 15px;
        border-bottom: 1px solid #eee;
    }

    .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 24px;
    }

    .switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: .4s;
        border-radius: 24px;
    }

    input:checked+.slider {
        background-color: #2196F3;
    }

    .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
    }

    input:checked+.slider:before {
        transform: translateX(26px);
    }

    .btn-push {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
    }
</style>

<div class="admin-body">
    <h2>디지털 총회 관제 센터</h2>

    <div class="status-bar">
        <div class="stat-card">현재 접속자: <b>712 / 750명</b></div>
        <div class="stat-card">활성 파일: <b>4개</b></div>
        <div class="stat-card">푸시 발송: <b>12회</b></div>
    </div>

    <table class="admin-table">
        <thead>
            <tr>
                <th>파일명</th>
                <th>업로드 일시</th>
                <th>실시간 공개</th>
                <th>푸시 발송</th>
                <th>조회수</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>제3호 안건 심의 자료.pdf</td>
                <td>2026-03-12 14:00</td>
                <td>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </td>
                <td><button class="btn-push">푸시 재발송</button></td>
                <td>689회</td>
            </tr>
            <tr>
                <td>제4호 안건(예정).pdf</td>
                <td>2026-03-12 14:05</td>
                <td>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </td>
                <td><button class="btn-push" style="background: #95a5a6;">대기</button></td>
                <td>0회</td>
            </tr>
        </tbody>
    </table>
</div>
